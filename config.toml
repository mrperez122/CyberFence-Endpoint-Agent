# CyberFence Agent Configuration
# Copy to:
#   Windows:  %PROGRAMDATA%\CyberFence\config.toml
#   macOS:    /etc/cyberfence/config.toml
#   Dev:      project root (loaded automatically in dev mode)

# ── Logging ───────────────────────────────────────────────────────────────────
log_level = "INFO"    # ERROR | WARN | INFO | DEBUG | TRACE

# Optional: override the log directory
# log_dir = "/path/to/custom/logs"

# ── File Monitor ──────────────────────────────────────────────────────────────
[monitor]
enabled           = true

# Milliseconds to wait before emitting a repeated event on the same file.
# Prevents burst noise from editors that write via temp→rename.
debounce_ms       = 250

# Maximum unprocessed events buffered before oldest are dropped.
ring_buffer_cap   = 2000

# Maximum file size in MB to queue for scanning. Larger files are logged
# but marked Excluded (scanner would time out on them anyway).
max_file_size_mb  = 256

# Additional directories beyond Downloads/Desktop/Documents to monitor.
# extra_watch_dirs = [
#     "C:\\Projects",
#     "D:\\Shared",
# ]

# Paths to never monitor (exact prefix match, case-insensitive on Windows).
exclusions = [
    # Windows system noise
    "C:\\Windows\\SoftwareDistribution",
    "C:\\Windows\\Temp\\WinStore",
    # Add your own below:
    # "C:\\ProgramData\\MyApp",
]

# File extensions to skip entirely (no dot, lowercase).
excluded_extensions = [
    "log",          # log rotation noise
    "tmp",          # temp files
    "db-wal",       # SQLite WAL files
    "db-shm",       # SQLite shared memory
    "part",         # partial downloads
    "crdownload",   # Chrome partial downloads
]

# ── Scanner ───────────────────────────────────────────────────────────────────
[scanner]
enabled           = true

# Path to clamscan binary. Leave empty to auto-detect.
# Windows: C:\Program Files\ClamAV\clamscan.exe (auto-detected)
# macOS:   /opt/homebrew/bin/clamscan (auto-detected via brew)
# clamscan_path = "/usr/local/bin/clamscan"

# ClamAV definitions directory. Leave empty for ClamAV default.
# definitions_dir = "/var/lib/clamav"

# Maximum file size to scan (MB). Larger files are skipped.
max_file_size_mb  = 256

# Timeout per file in seconds (prevents hanging on corrupted archives).
timeout_secs      = 30

# Parallel scan workers. 0 = half of CPU cores.
worker_threads    = 0

# Whether to scan inside archives (.zip, .tar, .gz, etc.)
scan_archives     = true

# Directories for full scan. Leave empty to use watch_dirs.
# full_scan_paths = [
#     "C:\\Users",
#     "D:\\Projects",
# ]
